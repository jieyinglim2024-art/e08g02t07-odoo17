trigger:
  branches:
    include:
      - Staging
      - master

pool:
  name: Default

variables:
  repoUrl: 'https://github.com/jieyinglim2024-art/e08g02t07-odoo17.git'
  updateScript: '/home/azureuser/deploy-temp/update_code.sh'
  stagePath: '/home/azureuser/'

stages:

# =========================
# STAGING STAGE
# =========================
- stage: Staging
  displayName: Deploy to Staging
  condition: succeeded() #eq(variables['Build.SourceBranchName'], 'Staging')

  jobs:
  - deployment: DeployStaging
    environment: Staging
    strategy:
      runOnce:
        deploy:
          steps:

          # Sync code
          - task: SSH@0
            displayName: "Sync Code - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                set -e
                echo "Deploying branch: $(Build.SourceBranchName)"
                cd $(stagePath)
                rm -rf deploy-temp *-odoo17
                
                git clone -b Staging $(repoUrl) --quiet
                mv *-odoo17 deploy-temp

                cd deploy-temp
                rm -f .DS_Store
                rm -rf .github

          # Run update script
          - task: SSH@0
            displayName: "Run Update Script - Staging"
            inputs:
              sshEndpoint: 'ssh-odoo17-staging'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)


# =========================
# PRODUCTION STAGE
# =========================
- stage: Production
  displayName: Deploy to Production
  dependsOn: Staging
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
  #condition: eq(variables['Build.SourceBranchName'], 'master')

  jobs:
  - deployment: DeployProduction
    environment: Production
    strategy:
      runOnce:
        deploy:
          steps:

          # Sync code
          - task: SSH@0
            displayName: "Sync Code - Production"
            inputs:
              sshEndpoint: 'ssh-odoo17-prod'
              runOptions: commands
              commands: |
                set -e
                # 1. Start completely fresh
                cd $(stagePath)
                rm -rf deploy-temp
                
                # 2. Clone directly into deploy-temp
                git clone -b master $(repoUrl) deploy-temp --quiet --depth 1
                cd deploy-temp

                # 3. Check for the .gz file specifically
                if [ -f "odoo.sql.gz" ]; then
                    echo "Found odoo.sql.gz (Size: $(ls -lh odoo.sql.gz | awk '{print $5}'))"
                    
                    # Decompress and overwrite any existing 0-byte odoo.sql
                    gunzip -c odoo.sql.gz > odoo.sql
                    
                    echo "Success: Uncompressed to odoo.sql ($(ls -lh odoo.sql | awk '{print $5}'))"
                else
                    echo "ERROR: odoo.sql.gz NOT FOUND in repository root!"
                    ls -F
                    exit 1
                fi

          # Uncompress SQL on VM
          - task: SSH@0
            displayName: "Uncompress odoo.sql.gz on VM"
            inputs:
              sshEndpoint: 'ssh-odoo17-prod'
              runOptions: commands
              commands: |
                set -e
                cd $(stagePath)/deploy-temp
                ls -F
                
                echo "Uncompressing odoo.sql.gz..."
                gunzip -c odoo.sql.gz > odoo.sql
                
                echo "Uncompress complete"
          
          # Restore Database
          - task: SSH@0
            displayName: "Restore Database"
            inputs:
              sshEndpoint: 'ssh-odoo17-prod'
              runOptions: commands
              commands: |
                set -e
                echo "$(PRODUSERPASSWORD)" | sudo -S -p '' cp /home/azureuser/deploy-temp/restore_db.sh /tmp/
                echo "$(PRODUSERPASSWORD)" | sudo -S -p '' cp /home/azureuser/deploy-temp/odoo.sql /tmp/

                echo "$(PRODUSERPASSWORD)" | sudo -S -p '' chmod +x /tmp/restore_db.sh
                echo "$(PRODUSERPASSWORD)" | sudo -S -p '' chmod 644 /tmp/odoo.sql

                echo "$(PRODUSERPASSWORD)" | sudo -S -p '' -u postgres /tmp/restore_db.sh "odoo17" "odoo" "/tmp/odoo.sql"

          # Run update script
          - task: SSH@0
            displayName: "Run Update Script - Production"
            inputs:
              sshEndpoint: 'ssh-odoo17-prod'
              runOptions: commands
              commands: |
                echo "$(PRODUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(PRODUSERPASSWORD)" | sudo -S -p '' $(updateScript)
